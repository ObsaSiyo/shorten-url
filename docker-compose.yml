services:
  shorten-bot:
    image: ghcr.io/obsasiyo/shorten-url:latest
    container_name: shorten-bot
    restart: unless-stopped
    env_file:
      - .env
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro   # GHCR auth
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"           # only update opted-in containers
      WATCHTOWER_CLEANUP: "true"                # delete old images
      WATCHTOWER_POLL_INTERVAL: 300             # 5 minutes
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    command: --label-enable --cleanup --interval 300